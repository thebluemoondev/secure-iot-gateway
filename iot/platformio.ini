; PlatformIO project config — ESP32 IoT Node
; Đọc HC-SR04 (siêu âm) + PN532 (NFC/RFID), ký RSA, mã hoá AES-GCM, gửi lên Cloud qua Socket TCP.

[env:esp32dev]
; Ghim phiên bản platform (ESP-IDF 5.x / mbedtls 3.x) vì crypto_utils.cpp dùng
; chữ ký hàm mbedtls_pk_sign()/mbedtls_pk_encrypt() của mbedtls 3.x (có tham số
; sig_size). Có thể nâng lên bản mới hơn cùng nhánh 3.x nếu cần.
platform = espressif32@^6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    adafruit/Adafruit PN532@^1.3.3
    bblanchon/ArduinoJson@^7.1.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
